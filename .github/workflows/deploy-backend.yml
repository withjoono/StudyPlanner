name: Deploy Backend
# Last triggered: 2026-05-08 (AUTH_SECRET 갱신 후 강제 재배포)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout geobuk-shared
        uses: actions/checkout@v4
        with:
          repository: withjoono/geobuk-shared
          path: .geobuk-temp
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and pack geobuk-shared
        run: |
          cd .geobuk-temp
          npm install --ignore-scripts
          npm run build
          npm pack
          mkdir -p $GITHUB_WORKSPACE/../geobuk-shared
          mv withjoono-geobuk-shared-*.tgz $GITHUB_WORKSPACE/../geobuk-shared/geobuk-shared.tgz

      - name: Generate app.yaml from secrets
        working-directory: backend
        run: |
          {
            echo 'runtime: nodejs22'
            echo 'service: studyplanner-backend'
            echo 'entrypoint: node dist/main.js'
            echo ''
            echo 'instance_class: F2'
            echo ''
            echo 'env_variables:'
            echo '  NODE_ENV: "production"'
            echo '  PORT: "8080"'
            printf '  DATABASE_URL: "%s"\n' "$DATABASE_URL"
            printf '  AUTH_SECRET: "%s"\n' "$AUTH_SECRET"
            echo '  HUB_API_URL: "https://ts-back-nest-479305.du.r.appspot.com"'
            printf '  NEIS_API_KEY: "%s"\n' "$NEIS_API_KEY"
            echo ''
            echo 'beta_settings:'
            echo '  cloud_sql_instances: "ts-back-nest-479305:asia-northeast3:geobuk-db"'
            echo ''
            echo 'automatic_scaling:'
            echo '  min_instances: 0'
            echo '  max_instances: 2'
            echo ''
            echo 'handlers:'
            echo '  - url: /.*'
            echo '    script: auto'
            echo '    secure: always'
          } > app.yaml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy ts-back-nest-479305:asia-northeast3:geobuk-db --port 5432 &
          sleep 3

      - name: Sync database schema
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}

      - name: Seed kyokwa subject data
        working-directory: backend
        run: node prisma/seed-kyokwa.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}

      - name: Deploy to App Engine
        working-directory: backend
        run: gcloud app deploy app.yaml --project=ts-back-nest-479305 --quiet
