name: Query Student Code (one-off)

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.9.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mv cloud-sql-proxy /usr/local/bin/

      - name: Start Cloud SQL Auth Proxy
        run: |
          cloud-sql-proxy --port 5434 ts-back-nest-479305:asia-northeast3:geobuk-db &
          sleep 5

      - name: Run Query
        env:
          PGPASSWORD: tsuser1234
        run: |
          psql -h 127.0.0.1 -p 5434 -U tsuser -d geobukschool_prod -c \
            'SELECT id, student_code, name FROM public."Student" WHERE user_id = '"'"'sp_S26H003141'"'"';'
