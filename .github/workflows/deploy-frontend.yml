name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout geobuk-shared (local dep)
        uses: actions/checkout@v4
        with:
          repository: withjoono/geobuk-shared
          path: .geobuk-temp
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build geobuk-shared and place at ../geobuk-shared
        run: |
          cd .geobuk-temp
          npm ci --ignore-scripts
          npm run build
          mkdir -p $GITHUB_WORKSPACE/../geobuk-shared
          cp -r dist package.json tailwind-preset.js $GITHUB_WORKSPACE/../geobuk-shared/

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type Check (Strict)
        working-directory: frontend
        run: yarn type-check

      - name: Build
        working-directory: frontend
        run: yarn build

      - name: Deploy to Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools deploy --only hosting --project=ts-front-479305 --token "${{ secrets.FIREBASE_TOKEN }}"
