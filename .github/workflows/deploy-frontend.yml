name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'yarn.lock'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout geobuk-shared
        uses: actions/checkout@v4
        with:
          repository: withjoono/geobuk-shared
          path: .geobuk-temp
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and pack geobuk-shared
        run: |
          cd .geobuk-temp
          npm install --ignore-scripts
          npm run build
          npm pack
          mkdir -p $GITHUB_WORKSPACE/../geobuk-shared
          mv withjoono-geobuk-shared-*.tgz $GITHUB_WORKSPACE/../geobuk-shared/geobuk-shared.tgz

      - name: Install dependencies
        run: yarn install

      - name: Type Check (Strict)
        working-directory: frontend
        run: yarn type-check

      - name: Build
        working-directory: frontend
        run: yarn build

      - name: Deploy to Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools deploy --only hosting --project=studyplanner-new --token "${{ secrets.FIREBASE_TOKEN }}"
